<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | PatternIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#006948", "primary-container": "#00855d",
          "surface": "#f7f9fb", "surface-container-lowest": "#ffffff",
          "surface-container-low": "#f2f4f6", "surface-container": "#eceef0",
          "on-surface": "#191c1e", "outline": "#6d7a72", "outline-variant": "#bccac0",
          "secondary": "#545f73", "error": "#ba1a1a", "on-primary": "#ffffff",
          "error-container": "#ffdad6", "on-error-container": "#93000a",
        },
        fontFamily: {"headline": ["Manrope"], "body": ["Inter"], "label": ["Space Grotesk"]},
      },
    },
  }
</script>
<style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center">
<div class="w-full max-w-md p-8 bg-surface-container-lowest rounded-2xl shadow-lg">
  <div class="mb-8 text-center">
    <h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">PatternIQ</h1>
    <p class="text-secondary text-sm mt-1">Sign in to your account</p>
  </div>

  {% if messages %}
  <div class="mb-4 space-y-2">
    {% for message in messages %}
    <div class="px-4 py-2 rounded-lg text-sm {% if message.tags == 'error' %}bg-error-container text-on-error-container{% else %}bg-primary/10 text-primary{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post" class="space-y-5">
    {% csrf_token %}
    <div>
      <label class="block font-label text-xs uppercase tracking-widest text-secondary mb-1.5">Username</label>
      <input name="username" type="text" required autocomplete="username"
             class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-low focus:ring-2 focus:ring-primary/30 focus:border-primary text-sm font-body outline-none transition"
             placeholder="Enter username"/>
    </div>
    <div>
      <label class="block font-label text-xs uppercase tracking-widest text-secondary mb-1.5">Password</label>
      <input name="password" type="password" required autocomplete="current-password"
             class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-low focus:ring-2 focus:ring-primary/30 focus:border-primary text-sm font-body outline-none transition"
             placeholder="Enter password"/>
    </div>
    <button type="submit"
            class="w-full py-3 rounded-lg bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-sm shadow-lg hover:opacity-90 transition-all">
      Sign In
    </button>
  </form>

  <p class="mt-6 text-center text-sm text-secondary">
    Don't have an account?
    <a href="{% url 'auth:register' %}" class="text-primary font-semibold hover:underline">Register</a>
  </p>
</div>
</body>
</html>
